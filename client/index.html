<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <!-- No maximum-scale/user-scalable: capping zoom blocks pinch-to-zoom on
         Android Chrome and fails WCAG 1.4.4. Readers must be able to zoom. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />

    <!-- Applies the saved text size before first paint, so the page doesn't
         render at the default and then jump. Mirrors ROOT_FONT_SIZE in
         client/src/contexts/TextSizeContext.tsx — keep the two in sync. -->
    <script>
      (function () {
        try {
          var sizes = { small: "100%", medium: "112.5%", large: "125%" };
          var icons = { small: "1", medium: "1.125", large: "1.25" };
          var saved = localStorage.getItem("munymo-text-size");
          document.documentElement.style.fontSize = sizes[saved] || sizes.medium;
          document.documentElement.style.setProperty("--icon-scale", icons[saved] || icons.medium);
        } catch (e) {
          document.documentElement.style.fontSize = "112.5%";
          document.documentElement.style.setProperty("--icon-scale", "1.125");
        }
      })();
    </script>

    <!-- Google tag (gtag.js) — GA4 (G-RLCKFXCSF3).
         Munymo is a single-page app: this ONE install covers every route,
         current and future. Do NOT add gtag to individual page components —
         it would double-count. New pages are tracked automatically. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RLCKFXCSF3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RLCKFXCSF3');
    </script>

    <!-- SEO defaults for the landing page. Per-route titles/descriptions are
         set client-side by usePageMeta (client/src/hooks/usePageMeta.ts) —
         keep these defaults in sync with DEFAULT_TITLE/DEFAULT_DESCRIPTION
         there. The og:/twitter: tags stay static: social scrapers don't run
         JS, so they always see the site-wide card below. -->
    <title>Munymo — Free Daily Stock Market Prediction Game</title>
    <meta
      name="description"
      content="Munymo is a free daily stock market game. Predict which of two companies will perform better, read the day's research, and build real market intuition in five minutes a day." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Munymo" />
    <meta property="og:title" content="Munymo — Free Daily Stock Market Prediction Game" />
    <meta
      property="og:description"
      content="One matchup between two real companies every US trading day. Predict the winner, read the research, build real market intuition — five minutes, no real money." />
    <meta property="og:url" content="https://munymo.com/" />
    <meta property="og:image" content="https://munymo.com/munymo-logo-cropped_e625fcf7.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Munymo — Free Daily Stock Market Prediction Game" />
    <meta
      name="twitter:description"
      content="One matchup between two real companies every US trading day. Predict the winner, read the research, build real market intuition — five minutes, no real money." />
    <meta name="twitter:image" content="https://munymo.com/apple-touch-icon.png" />

    <!-- Site-level structured data. FAQPage JSON-LD is rendered separately on
         the landing page (client/src/pages/Home.tsx). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://munymo.com/#org",
            "name": "Munymo",
            "url": "https://munymo.com/",
            "logo": "https://munymo.com/apple-touch-icon.png"
          },
          {
            "@type": "WebSite",
            "name": "Munymo",
            "url": "https://munymo.com/",
            "publisher": { "@id": "https://munymo.com/#org" }
          },
          {
            "@type": "WebApplication",
            "name": "Munymo",
            "url": "https://munymo.com/",
            "applicationCategory": "GameApplication",
            "operatingSystem": "Web",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "description": "A free daily stock market prediction game. Each US trading day, players predict which of two companies will perform better, read a plain-English research brief, and build market intuition through practice."
          }
        ]
      }
    </script>

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
