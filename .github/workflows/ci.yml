name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # No `version:` here on purpose — pnpm/action-setup reads the pinned
      # version from package.json's "packageManager" field (the single source
      # of truth). Specifying it in both places makes the action error with
      # ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: pnpm test
